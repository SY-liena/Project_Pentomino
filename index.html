<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전공 로드맵 시각화 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">PNU Roadmap</a>
            <ul class="nav-menu">
                <li><a href="#">홈</a></li>
                <li><a href="#">학과 안내</a></li>
                <li><a href="#">사용 방법</a></li>
                <li><a href="#" class="nav-btn-ai" onclick="toggleChat()">AI 전공 가이드</a></li>
            </ul>
        </div>
    </nav>

    <div id="chat-container" style="display: none;">
        <div id="chat-header">
            <span>🤖 AI 전공 상담소</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">×</button>
        </div>
        <div id="chat-window">
            <div class="msg bot">안녕하세요! 전공 선택과 로드맵에 대해 무엇이든 물어보세요.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="질문을 입력하세요...">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <script src="script.js"></script>

    <header>
        <h1>🎓 전공 로드맵 시각화</h1>
        <p class="subtitle">학과를 선택하면 전체 커리큘럼이 로드맵으로 표시됩니다.</p>
        <div class="controls">
            <select id="dept-select">
                <option value="">학과 로딩 중...</option>
            </select>
        </div>
    </header>


    <main id="roadmap-container">
        <div class="placeholder">데이터를 불러오는 중입니다...</div>
    </main>

    <footer>
        <p>© 2026 Major Roadmap System | Pusan National University 다리놔드림</p>
    </footer>

</body>
</html>
